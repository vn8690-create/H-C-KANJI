<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CYBER KANJI</title>
  <link rel="stylesheet" href="./style.css">
</head>
<body>

<div class="container">

  <h1>CYBER KANJI</h1>
  <p class="subtitle">HỆ THỐNG KÍCH HOẠT NÃO BỘ TỪ VỰNG N5 - N1</p>

  <div class="login-box">
    <label>MẬT DANH ĐẶC VỤ:</label>
    <input type="text" id="username" placeholder="Tên của bạn">
    <button id="startBtn">KÍCH HOẠT HỆ THỐNG ⚡</button>
  </div>

  <div id="welcome"></div>

  <h2>CHỌN CẤP ĐỘ</h2>

  <div class="level-buttons">
    <button onclick="loadLevel('n5.json')">N5</button>
    <button onclick="loadLevel('n4.json')">N4</button>
    <button onclick="loadLevel('n3.json')">N3</button>
    <button onclick="loadLevel('n2.json')">N2</button>
    <button onclick="loadLevel('n1.json')">N1</button>
  </div>

  <div id="status"></div>

  <div class="card" id="wordCard">
    <h2 id="kanji">---</h2>
    <p id="reading"></p>
    <p id="meaning"></p>

    <div class="buttons">
      <button onclick="speakWord()">🔊 PHÁT ÂM</button>
      <button onclick="nextWord()">➡ TIẾP</button>
    </div>
  </div>

  <div class="shadowing">
    <h2>🎤 LUYỆN SHADOWING</h2>
    <p>Nghe và lặp lại thật to!</p>
    <button onclick="speakWord()">BẮT ĐẦU</button>
  </div>

</div>

<script src="./script.js"></script>
</body>
</html>
