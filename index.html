<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ứng Dụng Học Kanji</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="app-container">
        <header class="app-header">
            <div class="logo" onclick="ChuyenManHinh('man-home')">CYBER KANJI</div>
            <div class="score-box">XP: <span id="id-xp">0</span></div>
        </header>

        <section id="man-home" class="man-hinh active">
            <div class="welcome">Chào bro! Chọn cấp độ để kích hoạt bộ não từ vựng:</div>
            <div class="danh-sach-nut">
                <button class="nut-level" onclick="TaiDuLieuKanji('n5')">CẤP ĐỘ N5 🚀</button>
                <button class="nut-level" onclick="TaiDuLieuKanji('n4')">CẤP ĐỘ N4 ⚡</button>
                <button class="nut-level" onclick="TaiDuLieuKanji('n3')">CẤP ĐỘ N3 🔥</button>
                <button class="nut-level" onclick="TaiDuLieuKanji('n2')">CẤP ĐỘ N2 👑</button>
                <button class="nut-level" onclick="TaiDuLieuKanji('n1')">CẤP ĐỘ N1 🌌</button>
            </div>
        </section>

        <section id="man-hoc" class="man-hinh">
            <div class="thanh-dieu-huong">
                <h2 id="tieu-de-bai-hoc">Đang tải...</h2>
                <button class="nut-quay-lai" onclick="ChuyenManHinh('man-home')">QUAY LẠI</button>
            </div>
            <div id="vung-chua-the-kanji"></div>
        </section>
    </div>

    <script src="./app.js"></script>
</body>
</html>
