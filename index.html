<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Học Kanji N5</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="./style.css">
</head>
<body>

    <div class="app-shell">
        <header class="app-header">
            <div class="logo-neon" onclick="appNavigation.goHome()">KANJI LEARNING</div>
            <div class="header-stats">
                <div class="stat-badge xp">XP: <span id="xp-count">0</span></div>
                <div class="stat-badge level"><span id="level-display">N5</span></div>
            </div>
        </header>

        <main class="main-container">
            
            <section id="scr-login" class="screen">
                <div class="login-banner">
                    <h1 class="hero-title">CYBER KANJI</h1>
                    <p class="hero-subtitle">HỆ THỐNG HỌC TỪ VỰNG TIẾNG NHẬT</p>
                </div>
                <div class="login-card">
                    <label class="form-label">MẬT DANH ĐẶC VỤ:</label>
                    <input type="text" id="agent-name-input" class="cyber-input" value="Nam">
                    <button class="btn-primary" onclick="appNavigation.activateSystem()">KÍCH HOẠT HỆ THỐNG ⚡</button>
                </div>
            </section>

            <section id="scr-home" class="screen">
                <div class="hero-banner">
                    <p class="hero-subtitle">Chào đặc vụ: <strong id="js-agent-name" style="color: var(--neon-cyan);">Nam</strong></p>
                </div>
                <div class="level-menu-grid">
                    </div>
            </section>

            <section id="scr-learning" class="screen">
                <div class="screen-title-zone" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:15px;">
                    <h2 id="learning-title" style="font-size: 1.1rem; color:#fff;">ĐANG TẢI...</h2>
                    <button class="btn-back" onclick="appNavigation.goHome()">QUAY LẠI</button>
                </div>
                <div id="learning-content-list"></div>
            </section>

        </main>
    </div>

    <script src="./script.js"></script>
</body>
</html>
